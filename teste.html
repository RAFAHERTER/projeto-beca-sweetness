<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Card</title>

  <style>

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#1e1e1e;
      font-family:Arial, Helvetica, sans-serif;
    }

    .card{
      width:300px;
      height:400px;
      perspective:1000px;
    }

    .card-inner{
      width:100%;
      height:100%;
      position:relative;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    .card:hover .card-inner{
      transform:rotateY(180deg);
    }

    .card-front,
    .card-back{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:15px;
      backface-visibility:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      color:white;
      font-size:24px;
      font-weight:bold;
    }

    .card-front{
      background:#4f46e5;
    }

    .card-back{
      background:#111827;
      transform:rotateY(180deg);
    }

  </style>
</head>

<body>

  <div class="card">
    <div class="card-inner">

      <div class="card-front">
        Frente
      </div>

      <div class="card-back">
        Verso
      </div>

    </div>
  </div>

</body>
</html>
