<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Beca Sweetness</title>

    <link rel="stylesheet" href="../Estilos/style.css">

    <link rel="shortcut icon" href="../Imagens/logo-beca-sweetness.ico" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cormorant+Garamond:wght@500;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">

    <style>
        main{
            background-color: var(--azul-gelo);
            border-radius: 12px;
        }
        
    </style>

</head>
<body>

    <header>
        <h1>Beca Sweetness</h1>
    </header>

    <main class="auth-container">
        <form id="login-form" class="auth-form" action="../backend/login.php" method="post">
            <h2>Entrar</h2>

            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" name="email" required placeholder="seu@exemplo.com">

            <label for="login-senha">Senha</label>
            <div class="senha-wrapper">
                <input type="password" id="login-senha" name="senha" required placeholder="Sua senha">
                <button type="button" class="eye" onclick="togglePassword('login-senha', this)" aria-label="Mostrar senha">👁️</button>
            </div>

            <button type="submit" class="primary">Entrar</button>

            <p class="muted">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
    </main>

    <script src="../script/script.js"></script>
</body>
</html>
